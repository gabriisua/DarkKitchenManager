<div class="page-container">
  <div class="page-header">
    <h1 class="mat-headline-4" >Gestione Allergeni</h1>
  </div>

  <app-data-grid
    [columns]="columns"
    [data]="data()"
    [totalItems]="totalItems()"
    [loading]="loading()"
    [error]="error()"
    (sortChange)="onSortChange($event)"
    (pageChange)="onPageChange($event)"
    (retry)="refreshTable()"
  >
    <div gridSearch class="toolbar-row">

      <mat-form-field appearance="outline" class="toolbar-field search-field">
        <mat-label>Cerca allergeni...</mat-label>
        <input matInput [(ngModel)]="filters.search" (keyup.enter)="onSearch()" placeholder="Es. Glutine...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <button
        mat-stroked-button
        (click)="clearFilters()"
        matTooltip="Resetta i filtri"
        [disabled]="!hasActiveFilters()">
        <mat-icon>clear_all</mat-icon>
        Reset
      </button>

      <div class="spacer"></div>

      <button mat-raised-button color="primary" class="toolbar-cta" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon> Nuovo Allergene
      </button>
    </div>

    <ng-template #actionsTemplate let-row>
      <div class="action-buttons-container">
        <button mat-icon-button color="primary" (click)="editAllergen(row)" matTooltip="Modifica">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn" (click)="deleteAllergen(row)" matTooltip="Elimina">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </ng-template>
  </app-data-grid>
</div>
