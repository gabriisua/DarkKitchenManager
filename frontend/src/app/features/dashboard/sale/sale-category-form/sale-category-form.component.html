<h2 mat-dialog-title>{{ isEditMode ? 'Modifica Sconto Categoria' : 'Nuovo Sconto Categoria' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form-layout">

    <mat-form-field appearance="outline">
      <mat-label>Cliente</mat-label>
      <mat-select formControlName="customerId">
        <mat-option *ngFor="let c of customers()" [value]="c.id">{{ c.businessName }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('customerId')?.hasError('required')">Seleziona un cliente</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Categoria</mat-label>
      <mat-select formControlName="categoryId">
        <mat-option *ngFor="let cat of categories()" [value]="cat.id">{{ cat.name }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('categoryId')?.hasError('required')">Seleziona una categoria</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Sconto Applicato</mat-label>
      <input matInput type="number" formControlName="discountPercentage" placeholder="Es. 15" min="0" max="100" step="0.5">
      <span matTextSuffix>%</span>
      <mat-error *ngIf="form.get('discountPercentage')?.hasError('required')">Obbligatorio</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Valido Dal (Opzionale)</mat-label>
      <input matInput [matDatepicker]="fromPicker" formControlName="validFrom">
      <mat-datepicker-toggle matIconSuffix [for]="fromPicker"></mat-datepicker-toggle>
      <mat-datepicker #fromPicker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Valido Al (Opzionale)</mat-label>
      <input matInput [matDatepicker]="toPicker" formControlName="validTo">
      <mat-datepicker-toggle matIconSuffix [for]="toPicker"></mat-datepicker-toggle>
      <mat-datepicker #toPicker></mat-datepicker>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Annulla</button>
  <button mat-flat-button color="primary" class="gold-btn" (click)="onSubmit()">
    <mat-icon>save</mat-icon> Salva Sconto
  </button>
</mat-dialog-actions>
