<div class="page-container">
  <div class="page-header">
    <h1 class="mat-headline-4" >Gestione Ingredienti</h1>
  </div>

  <app-data-grid
    [columns]="columns"
    [data]="data()"
    [totalItems]="totalItems()"
    [loading]="loading()"
    [error]="error()"
    (sortChange)="onSortChange($event)"
    (pageChange)="onPageChange($event)"
    (retry)="refreshTable()"
  >

    <div gridSearch class="toolbar-row">

      <mat-form-field appearance="outline" class="toolbar-field search-field">
        <mat-label>Cerca ingredienti...</mat-label>
        <input
          matInput
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch($event)"
          placeholder="Nome ingrediente...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="range-pair">
        <mat-form-field appearance="outline">
          <mat-label>Kcal min</mat-label>
          <input matInput type="number" [(ngModel)]="filters.minEnergyKcal" (ngModelChange)="onFilterChange()" placeholder="0">
        </mat-form-field>
        <span>—</span>
        <mat-form-field appearance="outline">
          <mat-label>Kcal max</mat-label>
          <input matInput type="number" [(ngModel)]="filters.maxEnergyKcal" (ngModelChange)="onFilterChange()" placeholder="9999">
        </mat-form-field>
      </div>

      <div class="range-pair">
        <mat-form-field appearance="outline">
          <mat-label>Costo min (€)</mat-label>
          <input matInput type="number" [(ngModel)]="filters.minCost" (ngModelChange)="onFilterChange()" placeholder="0">
        </mat-form-field>
        <span>—</span>
        <mat-form-field appearance="outline">
          <mat-label>Costo max (€)</mat-label>
          <input matInput type="number" [(ngModel)]="filters.maxCost" (ngModelChange)="onFilterChange()" placeholder="999">
        </mat-form-field>
      </div>

      <button
        mat-stroked-button
        (click)="resetFilters()"
        matTooltip="Resetta tutti i filtri"
        [disabled]="!searchTerm && filters.minEnergyKcal === null && filters.maxEnergyKcal === null && filters.minCost === null && filters.maxCost === null">
        <mat-icon>clear_all</mat-icon>
        Reset
      </button>

      <div class="spacer"></div>

      <button
        mat-raised-button
        color="primary"
        class="toolbar-cta"
        (click)="addIngredient()">
        <mat-icon>add</mat-icon>
        Nuovo Ingrediente
      </button>

    </div>

    <ng-template #actionsTemplate let-row>
      <div class="action-buttons-container">

        <button
          mat-icon-button
          color="primary"
          matTooltip="Modifica"
          (click)="editIngredient(row)">
          <mat-icon>edit</mat-icon>
        </button>

        <button
          mat-icon-button
          color="warn"
          matTooltip="Elimina"
          (click)="deleteIngredient(row)">
          <mat-icon>delete</mat-icon>
        </button>

      </div>
    </ng-template>

  </app-data-grid>

</div>
