<div class="page-container">
  <div class="page-header">
    <h1 class="mat-headline-4">Gestione Categorie</h1>
  </div>

  <app-data-grid
    [columns]="columns"
    [data]="data()"
    [totalItems]="total()"
    [loading]="loading()"
    (sortChange)="onSortChange($event)"
    (pageChange)="onPageChange($event)"
    (retry)="query.next(query.value)"
  >
    <div gridSearch class="toolbar-row">

      <mat-form-field appearance="outline" class="toolbar-field search-field">
        <mat-label>Cerca categoria...</mat-label>
        <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearch($event)" placeholder="Digita nome...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="toolbar-field">
        <mat-label>Stato</mat-label>
        <mat-select [(value)]="isActiveFilter" (valueChange)="onFilterChange()">
          <mat-option [value]="null">Tutti</mat-option>
          <mat-option [value]="true">Attivi</mat-option>
          <mat-option [value]="false">Disattivati</mat-option>
        </mat-select>
      </mat-form-field>

      <button
        mat-stroked-button
        (click)="clearFilters()"
        matTooltip="Resetta i filtri"
        [disabled]="!hasActiveFilters()">
        <mat-icon>clear_all</mat-icon>
        Reset
      </button>

      <div class="spacer"></div>

      <button mat-raised-button color="primary" class="toolbar-cta" (click)="openModal()">
        <mat-icon>add</mat-icon> Nuova Categoria
      </button>
    </div>

    <ng-template #actionsTemplate let-row>
      <div class="action-buttons">
        <button mat-icon-button color="primary" matTooltip="Modifica" (click)="openModal(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" matTooltip="Elimina" (click)="deleteCategory(row)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </ng-template>

  </app-data-grid>
</div>
