<div class="login-wrap">

  <mat-card class="auth-card">

    <!-- BRAND -->
    <div class="brand">
      <img
        src="/assets/logo-ale.svg"
        alt="ALÉ"
        class="brand-logo"
      >
    </div>

    <p class="subtitle">
      Recupero password
    </p>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >

      <!-- EMAIL -->
      <mat-form-field
        appearance="outline"
        class="full-width"
      >

        <mat-label>Email</mat-label>

        <input
          matInput
          type="email"
          formControlName="email"
        >

        <mat-error
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
        >
          Inserisci una email valida
        </mat-error>

      </mat-form-field>

      <!-- SUBMIT -->
      <button
        mat-flat-button
        color="primary"
        class="full-width login-btn"
        type="submit"
        [disabled]="form.invalid || isSubmitting"
      >

        <mat-progress-spinner
          *ngIf="isSubmitting"
          diameter="20"
          mode="indeterminate"
        >
        </mat-progress-spinner>

        <span *ngIf="!isSubmitting">
          Invia richiesta reset
        </span>

      </button>

      <!-- SUCCESS -->
      <div
        class="success-msg"
        *ngIf="message"
      >
        {{ message }}
      </div>

      <!-- ERROR -->
      <mat-error
        class="server-err"
        *ngIf="error"
      >
        {{ error }}
      </mat-error>

      <!-- LINK -->
      <div class="links">

        <a
          mat-button
          color="primary"
          routerLink="/"
        >
          Torna al login
        </a>

      </div>

    </form>

  </mat-card>

</div>
