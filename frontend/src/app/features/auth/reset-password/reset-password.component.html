<div class="login-wrap">

  <mat-card class="auth-card">

    <!-- Brand -->
    <div class="brand">
      <img
        src="/assets/logo-ale.svg"
        alt="ALÉ"
        class="brand-logo"
      >
    </div>

    <p class="subtitle">Reset password</p>

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >

      <!-- PASSWORD -->
      <mat-form-field
        appearance="outline"
        class="full-width"
      >
        <mat-label>Nuova password</mat-label>

        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
        >

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword"
        >
          <mat-icon>
            {{ hidePassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>

        <mat-error
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
        >
          Minimo 8 caratteri
        </mat-error>

      </mat-form-field>

      <!-- CONFIRM PASSWORD -->
      <mat-form-field
        appearance="outline"
        class="full-width"
      >
        <mat-label>Conferma password</mat-label>

        <input
          matInput
          [type]="hideConfirmPassword ? 'password' : 'text'"
          formControlName="confirmPassword"
        >

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hideConfirmPassword = !hideConfirmPassword"
        >
          <mat-icon>
            {{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </button>

        <mat-error
          *ngIf="form.get('confirmPassword')?.touched && form.value.password !== form.value.confirmPassword"
        >
          Le password non coincidono
        </mat-error>

      </mat-form-field>

      <!-- BUTTON -->
      <button
        mat-flat-button
        color="primary"
        class="full-width login-btn"
        type="submit"
        [disabled]="form.invalid || isSubmitting"
      >

        <mat-progress-spinner
          *ngIf="isSubmitting"
          diameter="20"
          mode="indeterminate"
        >
        </mat-progress-spinner>

        <span *ngIf="!isSubmitting">
          Aggiorna password
        </span>

      </button>

      <!-- SUCCESS -->
      <div
        class="success-msg"
        *ngIf="success"
      >
        {{ success }}
      </div>

      <!-- ERROR -->
      <mat-error
        class="server-err"
        *ngIf="error"
      >
        {{ error }}
      </mat-error>

    </form>

  </mat-card>

</div>
